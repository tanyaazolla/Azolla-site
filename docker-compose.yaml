version: "3.2"

services:
  azolla-frontend:
    build:
      dockerfile: /home/ubuntu/workspace/Azolla-Prod-Env/Production-Azolla-Frontend/Dockerfile
      context: /home/ubuntu/workspace/Azolla-Prod-Env/Production-Azolla-Frontend
    image: azolla-frontend-image
    container_name: azolla-frontend-container

  
 
  nginx:
     image: nginx:latest
     container_name: nginx-container 
     ports:
       - "80:80"
       - "443:443"
     volumes:
       - /home/ubuntu/workspace/nginx.conf:/etc/nginx/nginx.conf
       - /home/ubuntu/workspace/final.crt:/etc/nginx/final.crt
       - /home/ubuntu/workspace/final.key:/etc/nginx/final.key

       #Above is nginx-configuration

networks:
  default:
    external:
      name: azolla
