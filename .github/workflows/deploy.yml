name: Deploy Azolla Frontend
 
on:

  push:

    branches:

      - main
 
jobs:

  deploy:

    runs-on: ubuntu-latest
 
    steps:

      - name: Deploy to Server

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SERVER_IP }}

          username: ${{ secrets.SERVER_USER }}

          password: ${{ secrets.SERVER_PASSWORD }}

          script: |

            cd ~/new-azolla-website

            git pull origin main

            sudo cp -r ~/new-azolla-website/. /home/ubuntu/Azolla/azolla-website/

            sudo docker compose -f /home/ubuntu/Azolla/docker-compose.yaml up -d --build azolla-frontend

            sudo docker image prune -af
 